<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>四則運算大對戰</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            overflow: hidden;
            height: 100vh;
        }
        #game-container { 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
        }
        .screen { 
            display: none; 
            width: 100%; 
            height: 100%; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
        }
        .active { display: flex !important; }
        
        /* 開始畫面 */
        #start-screen {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        #start-screen h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.4);
        }
        
        #start-screen p {
            font-size: 1.3rem;
            margin: 15px 0;
            opacity: 0.9;
        }
        
        .mode-buttons {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }
        
        /* 遊戲畫面 */
        #game-screen {
            background: #1a1a2e;
            padding: 0;
        }
        
        .game-header {
            background: rgba(0,0,0,0.5);
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            border-bottom: 3px solid #f39c12;
        }
        
        .game-header span {
            font-size: 1.2rem;
            color: #f39c12;
        }
        
        .game-ui { 
            display: flex; 
            width: 100%; 
            height: calc(100% - 70px);
            gap: 2px;
            background: #000;
        }
        
        .player-side { 
            flex: 1; 
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between;
            border: 3px solid #3498db;
            position: relative;
            overflow-y: auto;
        }
        
        .player-side.p1-side {
            border-color: #e74c3c;
        }
        
        .player-side.p2-side {
            border-color: #9b59b6;
        }
        
        .player-header {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .player-header h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        
        .player-stats {
            display: flex;
            gap: 15px;
            font-size: 1.1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .stat {
            background: rgba(0,0,0,0.3);
            padding: 8px 12px;
            border-radius: 5px;
        }
        
        .stat-label {
            color: #bdc3c7;
        }
        
        .stat-value {
            color: #f39c12;
            font-weight: bold;
            font-size: 1.3rem;
        }
        
        .monster {
            font-size: 3rem;
            margin: 15px 0;
            animation: bounce 0.6s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .question {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 20px 0;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f39c12;
        }
        
        .numpad {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
            width: 100%;
            max-width: 300px;
        }
        
        .answer-btn { 
            padding: 12px; 
            font-size: 1.2rem; 
            cursor: pointer; 
            border-radius: 8px; 
            border: 2px solid #3498db;
            background: #3498db;
            color: white;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .answer-btn:hover {
            background: #2980b9;
            transform: scale(1.05);
        }
        
        .answer-btn:active {
            transform: scale(0.95);
        }
        
        .answer-btn.correct {
            background: #27ae60;
            border-color: #27ae60;
            animation: pulse 0.5s ease-out;
        }
        
        .answer-btn.wrong {
            background: #e74c3c;
            border-color: #e74c3c;
            animation: shake 0.5s ease-out;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        button { 
            padding: 15px 30px; 
            font-size: 1.1rem; 
            cursor: pointer; 
            border-radius: 10px; 
            border: none; 
            margin: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .btn-primary {
            background: #f39c12;
            color: white;
            font-size: 1.3rem;
            padding: 20px 50px;
        }
        
        .btn-primary:hover {
            background: #e67e22;
        }
        
        /* 結束畫面 */
        #end-screen {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .end-content {
            text-align: center;
        }
        
        .end-content h1 {
            font-size: 3rem;
            margin-bottom: 30px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.4);
        }
        
        .end-stats {
            background: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 15px;
            margin: 20px auto;
            width: 90%;
            max-width: 500px;
        }
        
        .end-stats p {
            font-size: 1.5rem;
            margin: 15px 0;
        }
        
        .winner-name {
            font-size: 2.5rem;
            color: #f39c12;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .vs-section {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            gap: 20px;
        }
        
        .player-result {
            flex: 1;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
        }
        
        .player-result h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }
        
        .player-result p {
            font-size: 1.2rem;
            margin: 5px 0;
        }
        
        /* 隱藏 */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 開始畫面 -->
    <div id="start-screen" class="screen active">
        <h1>🎮 四則運算大對戰</h1>
        <p>挑戰你的計算能力！</p>
        <p style="font-size: 1rem; opacity: 0.8;">雙人即時對戰 - 先擊敗對手贏得勝利</p>
        <button class="btn-primary" onclick="startGame()">⚔️ 開始對戰</button>
    </div>

    <!-- 遊戲畫面 -->
    <div id="game-screen" class="screen">
        <div class="game-header">
            <div>騎士 (P1) - HP: <span id="hp1">100</span> | 分數: <span id="score1">0</span></div>
            <div>法師 (P2) - HP: <span id="hp2">100</span> | 分數: <span id="score2">0</span></div>
        </div>
        <div class="game-ui">
            <div class="player-side p1-side" id="p1">
                <div class="player-header">
                    <h2>⚔️ 騎士 (P1)</h2>
                </div>
                <div class="monster" id="monster1">👦</div>
                <div class="question" id="question1">載入中...</div>
                <div class="numpad" id="numpad1"></div>
            </div>
            
            <div class="player-side p2-side" id="p2">
                <div class="player-header">
                    <h2>🧙 法師 (P2)</h2>
                </div>
                <div class="monster" id="monster2">👧</div>
                <div class="question" id="question2">載入中...</div>
                <div class="numpad" id="numpad2"></div>
            </div>
        </div>
    </div>

    <!-- 結束畫面 -->
    <div id="end-screen" class="screen">
        <div class="end-content">
            <h1>🏆 對戰結束！</h1>
            <div class="winner-name" id="winner"></div>
            <div class="end-stats">
                <div class="vs-section">
                    <div class="player-result">
                        <h3>⚔️ 騎士 (P1)</h3>
                        <p>HP: <span id="final-hp1">0</span></p>
                        <p>分數: <span id="final-score1">0</span></p>
                    </div>
                    <div class="player-result">
                        <h3>🧙 法師 (P2)</h3>
                        <p>HP: <span id="final-hp2">0</span></p>
                        <p>分數: <span id="final-score2">0</span></p>
                    </div>
                </div>
            </div>
            <button class="btn-primary" onclick="location.reload()">🔄 重新開始</button>
        </div>
    </div>
</div>

<script>
    const questions = [
        { q: "125 + 48 ÷ 4 = ?", a: 137 },
        { q: "(350 - 50) ÷ 6 = ?", a: 50 },
        { q: "25 × 4 - 80 = ?", a: 20 },
        { q: "1200 ÷ (20 + 40) = ?", a: 20 },
        { q: "45 × 2 + 150 = ?", a: 240 },
        { q: "500 - 45 × 8 = ?", a: 140 },
        { q: "(12 + 18) × 5 = ?", a: 150 },
        { q: "800 ÷ 8 + 25 = ?", a: 125 },
        { q: "15 × 6 - 30 = ?", a: 60 },
        { q: "900 ÷ 9 - 50 = ?", a: 50 },
        { q: "(100 - 20) ÷ 4 = ?", a: 20 },
        { q: "36 ÷ 6 + 44 = ?", a: 50 },
        { q: "75 × 2 - 50 = ?", a: 100 },
        { q: "200 + 50 ÷ 5 = ?", a: 210 },
        { q: "(55 + 45) × 3 = ?", a: 300 },
        { q: "600 ÷ 10 + 40 = ?", a: 100 },
        { q: "12 × 5 + 40 = ?", a: 100 },
        { q: "90 - 40 ÷ 2 = ?", a: 70 },
        { q: "(200 - 50) ÷ 3 = ?", a: 50 },
        { q: "25 × 3 + 25 = ?", a: 100 },
        { q: "80 ÷ 4 × 5 = ?", a: 100 },
        { q: "400 - 150 × 2 = ?", a: 100 },
        { q: "(30 + 70) ÷ 5 = ?", a: 20 },
        { q: "18 × 4 + 28 = ?", a: 100 },
        { q: "500 ÷ 5 - 50 = ?", a: 50 },
        { q: "(80 - 20) × 2 = ?", a: 120 },
        { q: "60 × 3 + 120 = ?", a: 300 },
        { q: "99 + 1 - 50 = ?", a: 50 },
        { q: "300 ÷ 3 + 100 = ?", a: 200 },
        { q: "10 × 10 - 50 = ?", a: 50 }
    ];

    let p1Data = { hp: 100, score: 0, combo: 0, correctCount: 0 };
    let p2Data = { hp: 100, score: 0, combo: 0, correctCount: 0 };
    let usedQuestions = new Set();

    function startGame() {
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        loadQuestion(1);
        loadQuestion(2);
    }

    function loadQuestion(p) {
        let q;
        let attempts = 0;
        do {
            q = questions[Math.floor(Math.random() * questions.length)];
            attempts++;
        } while (usedQuestions.has(q.a) && attempts < 10 && usedQuestions.size < 30);

        if (attempts >= 10 || usedQuestions.size >= 30) {
            if (p1Data.hp <= 0 || p2Data.hp <= 0) {
                endGame();
                return;
            }
            usedQuestions.clear();
            q = questions[Math.floor(Math.random() * questions.length)];
        }

        usedQuestions.add(q.a);
        document.getElementById('question' + p).innerText = q.q;
        
        const options = [q.a];
        while (options.length < 4) {
            const fake = Math.floor(Math.random() * 300) + 1;
            if (!options.includes(fake)) options.push(fake);
        }
        options.sort(() => Math.random() - 0.5);

        const area = document.getElementById('numpad' + p);
        area.innerHTML = '';
        options.forEach(num => {
            const btn = document.createElement('button');
            btn.innerText = num;
            btn.className = 'answer-btn';
            btn.onclick = () => checkAnswer(p, num, q.a, btn);
            area.appendChild(btn);
        });
    }

    function checkAnswer(p, userA, realA, btn) {
        const data = p === 1 ? p1Data : p2Data;
        const otherData = p === 1 ? p2Data : p1Data;
        
        if (userA === realA) {
            btn.classList.add('correct');
            data.score += 100;
            data.combo++;
            data.correctCount++;
            if (data.combo % 3 === 0) {
                data.hp = Math.min(100, data.hp + 20);
                otherData.hp = Math.max(0, otherData.hp - 10);
            } else {
                otherData.hp = Math.max(0, otherData.hp - 5);
            }
        } else {
            btn.classList.add('wrong');
            data.hp = Math.max(0, data.hp - 15);
            data.combo = 0;
        }

        updateUI();

        if (data.hp <= 0 || otherData.hp <= 0) {
            setTimeout(endGame, 800);
        } else {
            setTimeout(() => loadQuestion(p), 1000);
        }
    }

    function updateUI() {
        document.getElementById('hp1').innerText = p1Data.hp;
        document.getElementById('score1').innerText = p1Data.score;
        document.getElementById('hp2').innerText = p2Data.hp;
        document.getElementById('score2').innerText = p2Data.score;
    }

    function endGame() {
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('end-screen').classList.add('active');

        let winner = p1Data.hp > p2Data.hp ? "⚔️ 騎士 (P1) 獲勝！" : "🧙 法師 (P2) 獲勝！";
        document.getElementById('winner').innerText = winner;
        
        document.getElementById('final-hp1').innerText = p1Data.hp;
        document.getElementById('final-score1').innerText = p1Data.score;
        document.getElementById('final-hp2').innerText = p2Data.hp;
        document.getElementById('final-score2').innerText = p2Data.score;
    }
</script>
</body>
</html>
